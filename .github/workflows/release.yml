name: Release VSIX

# Builds and publishes the sideloadable .vsix to a GitHub Release so that
# https://vibeperks.ai/vsix (which redirects to releases/latest/download) always
# resolves to the freshest package. This workflow lives at the root of the
# public VibePerks/vscode repo, into which plugin/vscode/ is mirrored by the
# monorepo's scripts/git-push-main.ps1. It is dormant inside the monorepo
# (only root-level .github/workflows run there).
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Test
        run: npm test

      - name: Build + package VSIX
        run: |
          npm run build
          npx --yes @vscode/vsce package --no-dependencies -o vibeperks.vsix

      - name: Publish to the moving "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          make_latest: true
          files: vibeperks.vsix
